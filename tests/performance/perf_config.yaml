---
# Performance testing configuration for Ferrum Gateway
# Uses global defaults with selective per-proxy overrides

proxies:
  # ⚠️  IMPORTANT: Per-proxy pool_max_idle_per_host values MUST be >= the wrk
  # connection count (default 100) to avoid connection churn during benchmarks.
  # These are intentionally set to 200 to match the global FERRUM_POOL_MAX_IDLE_PER_HOST.
  # DO NOT reduce these values below 200 for performance testing.

  - id: "proxy-health"
    name: "Health Check Proxy"
    listen_path: "/health"
    backend_protocol: http
    backend_host: "127.0.0.1"
    backend_port: 3001
    strip_listen_path: false
    preserve_host_header: false
    backend_connect_timeout_ms: 1000
    backend_read_timeout_ms: 5000
    backend_write_timeout_ms: 5000
    backend_tls_verify_server_cert: true
    auth_mode: single
    pool_max_idle_per_host: 200
    plugins: []

  - id: "proxy-users"
    name: "Users API Proxy"
    listen_path: "/api/users"
    backend_protocol: http
    backend_host: "127.0.0.1"
    backend_port: 3001
    strip_listen_path: false
    preserve_host_header: false
    backend_connect_timeout_ms: 1000
    backend_read_timeout_ms: 5000
    backend_write_timeout_ms: 5000
    backend_tls_verify_server_cert: true
    auth_mode: single
    pool_max_idle_per_host: 200
    pool_idle_timeout_seconds: 180
    plugins: []

  - id: "proxy-data"
    name: "Data API Proxy"
    listen_path: "/api/data"
    backend_protocol: http
    backend_host: "127.0.0.1"
    backend_port: 3001
    strip_listen_path: false
    preserve_host_header: false
    backend_connect_timeout_ms: 1000
    backend_read_timeout_ms: 10000
    backend_write_timeout_ms: 10000
    backend_tls_verify_server_cert: true
    auth_mode: single
    pool_max_idle_per_host: 200
    plugins: []

consumers: []

plugin_configs: []
